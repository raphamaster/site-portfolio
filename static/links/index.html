<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raphael Franco | Links</title>

<style>
:root {
    --bg: #070f1a;
    --card: #0f1b2d;
    --primary: #00e18c;
    --text: #e6edf3;
    --text-soft: #94a3b8;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 8px;
    font-size: 26px;
    font-weight: 600;
}

.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 20px;
    border: 1px solid #00e18c;
    /*box-shadow: 0 0 25px rgba(0, 225, 140, 0.35);*/
    transition: transform 0.3s ease;
}

.profile-img:hover {
    transform: scale(1.05);
}

.subtitle {
    color: var(--text-soft);
    font-size: 14px;
    margin-bottom: 30px;
}

.link-button {
    display: block;
    background: var(--card);
    color: var(--text);
    text-decoration: none;
    padding: 16px;
    margin: 14px 0;
    border-radius: 10px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.25s ease;
}

.link-button:hover {
    background: var(--primary);
    color: #000;
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,225,140,0.25);
}

.badge {
    display: inline-block;
    background: rgba(0,225,140,0.1);
    color: var(--primary);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin-bottom: 20px;
}

.footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--text-soft);
}
</style>
</head>

<body>

<div class="container">

    <img src="https://avatars.githubusercontent.com/u/23094?v=4" alt="Raphael Franco" class="profile-img">
    <!--<div class="badge">Disponível para projetos</div>-->

    <h1>Raphael Franco</h1>
    <div class="subtitle">
        Engenharia de Dados • Analytics • Performance e Visualização
    </div>

    <a href="https://raphaelfranco.com" class="link-button">
        🌐 Site Oficial
    </a>

    <a href="https://raphaelfranco.com/projects" class="link-button">
        👨‍💻 Portfólio
    </a>

    <a href="https://www.linkedin.com/in/raphaelfranco" class="link-button">
        💼 LinkedIn
    </a>

    <a href="https://github.com/raphamaster" class="link-button">
        💻 GitHub
    </a>

    <a href="https://raphaelfranco.com/#contato" class="link-button">
        📩 Fale Comigo
    </a>

    <a href="https://substack.com/@raphaelfranco" class="link-button">
        📘 Substack
    </a>
    
    <div class="footer">
        © 2026 Raphael Franco
    </div>

</div>

</body>
</html>
